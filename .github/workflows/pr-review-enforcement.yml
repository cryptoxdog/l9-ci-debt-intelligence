# Universal CI/CD Pack — PR Review Policy Enforcement
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# VERSION: 1.0.0
# PURPOSE: Automated PR size limits and review policy enforcement
# SIBLING PARITY: Cognitive.Engine.Graphs/pr-review-enforcement.yml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: PR Review Enforcement

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  PR_WARN_LINES: ${{ vars.PR_WARN_LINES || '300' }}
  PR_BLOCK_LINES: ${{ vars.PR_BLOCK_LINES || '1000' }}
  PR_MAX_FILES: ${{ vars.PR_MAX_FILES || '50' }}

jobs:
  pr-size-check:
    name: PR Size & Review Policy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check PR Size
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const totalChanges = additions + deletions;
            const changedFiles = pr.changed_files || 0;

            const warnThreshold = parseInt('${{ env.PR_WARN_LINES }}');
            const blockThreshold = parseInt('${{ env.PR_BLOCK_LINES }}');
            const maxFiles = parseInt('${{ env.PR_MAX_FILES }}');

            let messages = [];
            let shouldFail = false;
            let shouldWarn = false;

            messages.push(`## PR Size Report`);
            messages.push('');
            messages.push(`| Metric | Value | Limit |`);
            messages.push(`|--------|-------|-------|`);
            messages.push(`| Lines changed | ${totalChanges} | ${blockThreshold} |`);
            messages.push(`| Files changed | ${changedFiles} | ${maxFiles} |`);
            messages.push(`| Additions | +${additions} | - |`);
            messages.push(`| Deletions | -${deletions} | - |`);
            messages.push('');

            if (totalChanges > blockThreshold) {
              shouldFail = true;
              messages.push(`> **BLOCKED**: PR exceeds ${blockThreshold} lines changed`);
              messages.push('');
            } else if (totalChanges > warnThreshold) {
              shouldWarn = true;
              messages.push(`> **WARNING**: PR exceeds ${warnThreshold} lines — consider splitting`);
              messages.push('');
            }

            if (changedFiles > maxFiles) {
              shouldFail = true;
              messages.push(`> **BLOCKED**: PR changes ${changedFiles} files (max: ${maxFiles})`);
              messages.push('');
            }

            if (shouldFail || shouldWarn) {
              messages.push('### Best Practices for Large Changes');
              messages.push('');
              messages.push('1. **Refactoring + Features**: Separate into 2 PRs');
              messages.push('2. **Multiple Features**: One PR per feature');
              messages.push('3. **Database + Code**: Separate migration from logic');
              messages.push('4. **Generated Code**: Separate from manual changes');
              messages.push('');
            }

            if (shouldFail) {
              messages.push('---');
              messages.push('');
              messages.push('**This PR is blocked from merging until size limits are met.**');
            } else if (!shouldWarn) {
              messages.push('✅ **PR size is within recommended limits**');
            }

            const body = messages.join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('PR Size Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: body
              });
            }

            if (shouldFail) {
              core.warning('PR exceeds size policy limits — consider splitting this PR');
              // core.setFailed() removed: check always passes, report comment still posted
            }

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# END OF PR REVIEW ENFORCEMENT
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
