name: publish-astgrep-pack

on:
  push:
    branches: [main]
    paths:
      - "outputs/defense/astgrep/**"
      - "tools/defense/corpus_to_astgrep.py"
  workflow_dispatch:

jobs:
  package-and-publish:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pyyaml typer

      - name: Export ast-grep pack
        run: python tools/packaging/export_astgrep_pack.py

      - name: Upload ast-grep pack
        uses: actions/upload-artifact@v4
        with:
          name: astgrep-pack-${{ github.run_id }}
          path: dist/astgrep-pack/
          retention-days: 90
