name: corpus-update

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Resolver repo that produced the corpus (owner/name)"
        required: false
        default: "Quantum-L9/l9-ci-debt-resolver"
      run_id:
        description: "Resolver workflow run id that uploaded ci-debt-resolver-corpus"
        required: false
  repository_dispatch:
    types: [ci_debt_resolver_corpus_ready]

permissions:
  contents: read

env:
  RESOLVER_ARTIFACT: ci-debt-resolver-corpus

jobs:
  ingest-and-normalize:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      L9_RESOLVER_READ_TOKEN: ${{ secrets.L9_RESOLVER_READ_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install jsonschema pydantic pyyaml rich typer

      - name: Resolve source run
        id: src
        env:
          EVENT_NAME: ${{ github.event_name }}
          CP_REPO: ${{ github.event.client_payload.source_repo }}
          CP_RUN: ${{ github.event.client_payload.run_id }}
          IN_REPO: ${{ github.event.inputs.source_repo }}
          IN_RUN: ${{ github.event.inputs.run_id }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            repo="$CP_REPO"
            run="$CP_RUN"
          else
            repo="$IN_REPO"
            run="$IN_RUN"
          fi
          if [ -z "$repo" ] || [ -z "$run" ]; then
            echo "::error::source_repo and run_id are required (repo='$repo' run='$run')"
            exit 1
          fi
          echo "repo=$repo" >> "$GITHUB_OUTPUT"
          echo "run=$run" >> "$GITHUB_OUTPUT"

      - name: Download resolver corpus artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.RESOLVER_ARTIFACT }}
          path: /tmp/resolver-corpus
          repository: ${{ steps.src.outputs.repo }}
          run-id: ${{ steps.src.outputs.run }}
          github-token: ${{ env.L9_RESOLVER_READ_TOKEN }}

      - name: Map resolver findings to corpus schema
        run: |
          python tools/corpus/map_resolver_findings.py \
            /tmp/resolver-corpus/CI_DEBT_FINDINGS.jsonl \
            --output-path /tmp/corpus_ready.jsonl

      - name: Ingest findings
        run: |
          python tools/corpus/ingest_findings.py \
            /tmp/corpus_ready.jsonl \
            --output-dir outputs/corpus

      - name: Normalize corpus
        run: python tools/corpus/normalize_corpus.py

      - name: Validate corpus
        run: python tools/corpus/validate_corpus.py --strict

      - name: Build offense artifacts
        run: |
          python tools/offense/build_cooccurrence_matrix.py
          python tools/offense/build_effort_atlas.py
          python tools/offense/corpus_to_invariants.py
          python tools/offense/few_shot_loader.py
          python tools/offense/sbom_from_findings.py

      - name: Build defense artifacts
        run: |
          python tools/defense/copilot_instructions_generator.py
          python tools/defense/corpus_to_astgrep.py
          python tools/defense/checklist_library_builder.py

      - name: Validate all outputs
        run: python tools/validation/validate_outputs.py --strict

      - name: Upload corpus artifacts
        uses: actions/upload-artifact@v4
        with:
          name: intelligence-outputs-${{ github.run_id }}
          path: outputs/
          retention-days: 30
