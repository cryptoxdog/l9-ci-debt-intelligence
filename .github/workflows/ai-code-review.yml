# l9_schema: 1
# origin: l9-template
# engine: ci-debt
# layer: [ci]
# tags: [perplexity, ai-review, auto]
# owner: platform
# status: active
# --- /L9_META ---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# AI Code Review (Perplexity) — auto on PR, advisory (non-blocking)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Ported from Quantum-L9/Enrichment.Inference.Engine.
# Secret: PERPLEXITY_API_KEY (org secret, visibility=all). If absent, the run
# skips gracefully instead of failing.
# Script: tools/ai_review.py
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: AI Code Review (Perplexity)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  ai-review:
    name: Perplexity AI Review
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Perplexity API Key
        id: key
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          if [ -n "$PERPLEXITY_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PERPLEXITY_API_KEY not configured (fork PR or missing secret) — skipping AI review"
          fi

      - name: Set up Python
        if: steps.key.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dependencies
        if: steps.key.outputs.present == 'true'
        run: pip install "httpx>=0.27.0"

      - name: Get PR Diff
        id: diff
        if: steps.key.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          echo "Fetching diff for PR #$PR_NUM..."
          gh pr diff "$PR_NUM" --repo "$GITHUB_REPOSITORY" > pr_diff.txt || {
            echo "::warning::Failed to fetch PR #$PR_NUM diff"
            echo "empty=true" >> "$GITHUB_OUTPUT"
            exit 0
          }
          if [ ! -s pr_diff.txt ]; then
            echo "::warning::No diff found — nothing to review"
            echo "empty=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "empty=false" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          DIFF_SIZE=$(wc -c < pr_diff.txt)
          echo "Diff size: $DIFF_SIZE bytes"
          if [ "$DIFF_SIZE" -gt 400000 ]; then
            head -c 400000 pr_diff.txt > pr_diff_truncated.txt
            mv pr_diff_truncated.txt pr_diff.txt
            echo "::warning::Diff truncated to 400KB"
          fi

      - name: Run AI Review
        id: review
        if: steps.key.outputs.present == 'true' && steps.diff.outputs.empty != 'true'
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          set +e
          PYTHONPATH=. python3 tools/ai_review.py \
            --mode file \
            --diff-path pr_diff.txt \
            --no-block 2>&1 | tee review_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Generate Markdown Report
        if: steps.key.outputs.present == 'true' && steps.diff.outputs.empty != 'true'
        run: |
          cat > review_comment.md << 'HEADER'
          <!-- ai-code-review-perplexity -->
          ## 🤖 AI Code Review (Perplexity)

          HEADER
          echo "**PR:** #${{ steps.diff.outputs.pr_number }}" >> review_comment.md
          echo "**Mode:** advisory (non-blocking)" >> review_comment.md
          echo "" >> review_comment.md
          echo "---" >> review_comment.md
          echo "" >> review_comment.md
          echo '```' >> review_comment.md
          head -c 50000 review_output.txt >> review_comment.md
          echo '' >> review_comment.md
          echo '```' >> review_comment.md
          echo "" >> review_comment.md
          echo "_Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_" >> review_comment.md

      - name: Post PR Comment
        if: steps.key.outputs.present == 'true' && steps.diff.outputs.empty != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ai-code-review-perplexity -->';
            const body = fs.readFileSync('review_comment.md', 'utf8');
            const prNumber = parseInt('${{ steps.diff.outputs.pr_number }}', 10);
            if (!prNumber) { core.info('No PR number — skipping comment'); return; }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
              core.info(`Updated existing comment on PR #${prNumber}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, body,
              });
              core.info(`Created new comment on PR #${prNumber}`);
            }

      - name: Upload Review Artifact
        if: steps.key.outputs.present == 'true' && steps.diff.outputs.empty != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-output
          path: |
            review_output.txt
            review_comment.md
          retention-days: 30
