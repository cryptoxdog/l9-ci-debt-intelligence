name: Intelligence Phase 5 compilation
on:
  pull_request:
    paths:
      - ".l9/compiler-contract.yaml"
      - "schemas/intelligence/**"
      - "src/l9_debt_intelligence/compilation/**"
      - "src/l9_debt_intelligence/cli.py"
      - "tests/compilation/**"
      - "tests/architecture/**"
  push:
    branches:
      - main
    paths:
      - ".l9/compiler-contract.yaml"
      - "schemas/intelligence/**"
      - "src/l9_debt_intelligence/compilation/**"
      - "src/l9_debt_intelligence/cli.py"
      - "tests/compilation/**"
      - "tests/architecture/**"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: intelligence-phase-5-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout immutable event revision
        env:
          REPOSITORY: ${{ github.repository }}
          REVISION: ${{ github.sha }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin \
            "https://x-access-token:${TOKEN}@github.com/${REPOSITORY}.git"
          git -c protocol.version=2 fetch --depth=1 origin "${REVISION}"
          git checkout --detach FETCH_HEAD
          git remote set-url origin \
            "https://github.com/${REPOSITORY}.git"
      - name: Install project
        run: |
          python -m pip install \
            --disable-pip-version-check \
            --no-input \
            -e ".[dev]"
          python -m pip install \
            --disable-pip-version-check \
            --no-input \
            -r requirements/snapshot.txt
      - name: Run complete contract suite
        run: |
          python -m pytest \
            tests/architecture \
            tests/contracts \
            tests/ingestion \
            tests/snapshots \
            tests/analytics \
            tests/compilation
