name: Intelligence Phase 1 contracts
on:
  pull_request:
    paths:
      - ".l9/**"
      - "schemas/intelligence/**"
      - "src/l9_debt_intelligence/**"
      - "tests/architecture/**"
      - "tests/contracts/**"
      - "pyproject.toml"
  push:
    branches:
      - main
    paths:
      - ".l9/**"
      - "schemas/intelligence/**"
      - "src/l9_debt_intelligence/**"
      - "tests/architecture/**"
      - "tests/contracts/**"
      - "pyproject.toml"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: intelligence-phase-1-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout immutable event revision
        env:
          REPOSITORY: ${{ github.repository }}
          REVISION: ${{ github.sha }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin \
            "https://x-access-token:${TOKEN}@github.com/${REPOSITORY}.git"
          git -c protocol.version=2 fetch --depth=1 origin "${REVISION}"
          git checkout --detach FETCH_HEAD
          git remote set-url origin \
            "https://github.com/${REPOSITORY}.git"
      - name: Install project
        run: |
          python -m pip install --disable-pip-version-check \
            --no-input -e ".[dev]"
      - name: Run Phase 1 tests
        run: |
          python -m pytest \
            tests/architecture \
            tests/contracts
