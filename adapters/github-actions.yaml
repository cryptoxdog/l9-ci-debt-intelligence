# Adapter: github-actions
# Load when: target repo uses GitHub Actions as its CI system.
# Changes: offense rules add GHA-specific pattern matchers;
#          defense scaffolds include .github/workflows/ci.yml templates;
#          ast-grep rules target YAML workflow files in addition to Python.

adapter_id: github-actions
load_when: ci_system == "github-actions"
changes:
  authority_order_addition:
    - "GHA workflow YAML files have equal authority to Python source for CI-IMPORT-* and CI-DEPS-* rules"
  offense_additions:
    - rule: corpus_to_invariants
      addition: "Include GHA job-level PYTHONPATH patterns in invariant conditions"
    - rule: build_effort_atlas
      addition: "Tag effort_atlas entries with gha_job_name when available in finding location"
  defense_additions:
    - rule: corpus_to_astgrep
      addition: "Generate ast-grep rules targeting YAML (language: yaml) for GHA workflow files"
      languages: [python, yaml]
    - rule: scaffold_generator
      addition: "Include .github/workflows/ci.yml with PYTHONPATH env and Install deps step in all scaffolds"
  forbidden_moves:
    - "Do not generate ast-grep rules for YAML that require Python AST parsing"
