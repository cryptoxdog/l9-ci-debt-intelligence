adapter_id: python-uv
load_when: python_package_manager == "uv"
changes:
  defense_additions:
    - rule: scaffold_generator
      addition: "pyproject.toml uses [project] table with [project.dependencies] list (PEP 621)"
    - rule: corpus_to_astgrep
      addition: "ast-grep rules for CI-DEPS-001 target pyproject.toml [project.dependencies] array"
    - rule: copilot_instructions_generator
      addition: "Include uv add <package> as the canonical install command in CI-DEPS-001 instruction"
  forbidden_moves:
    - "Do not generate setup.py or requirements.txt scaffolds for uv repos"
    - "Do not use pip install in scaffold ci.yml when uv is the package manager"

scaffold_files:
  pyproject.toml: |
    [project]
    name = "REPLACE_ME"
    version = "0.1.0"
    requires-python = ">=3.11"
    dependencies = [
        "pydantic>=2.0",
        "pyyaml",
        "jsonschema",
    ]

    [project.optional-dependencies]
    dev = ["pytest", "ruff", "mypy"]

    [build-system]
    requires = ["hatchling"]
    build-backend = "hatchling.build"
  .github/workflows/ci.yml: |
    name: CI
    on:
      push:
        branches: [main]
      pull_request:
        branches: [main]
    jobs:
      lint-and-test:
        runs-on: ubuntu-latest
        env:
          PYTHONPATH: ${{ github.workspace }}
        steps:
          - uses: actions/checkout@v4
          - uses: astral-sh/setup-uv@v4
            with:
              version: "latest"
          - uses: actions/setup-python@v5
            with:
              python-version: "3.11"
          - name: Install deps
            run: uv sync --all-extras
          - name: Compile check
            run: python -m compileall . -q
          - name: Lint
            run: uv run ruff check .
          - name: Test
            run: uv run pytest -q
  AGENTS.md: |
    # AGENTS.md
    ## Repo contract
    - Python package manager: uv
    - CI: GitHub Actions
    - Gate A: python -m compileall . -q
    - Gate B: uv run ruff check .
    - Gate C: uv run pytest -q
    - Gate D: validate workflow YAML
    ## Forbidden
    - No force-push, no gate weakening, no setup.py, no pip install in CI
