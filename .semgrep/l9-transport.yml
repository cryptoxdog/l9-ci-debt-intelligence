# --- L9_META ---
# l9_schema: 1
# origin: l9-ci-universal-base
# layer: [ci, semgrep, transport]
# tags: [L9_TEMPLATE, TransportPacket, shadow-mode, ast-governance]
# owner: platform
# status: active
# --- /L9_META ---
rules:
  - id: l9.transport.packet-envelope-import
    languages: [python]
    severity: WARNING
    message: PacketEnvelope is forbidden as an active contract. Use TransportPacket only.
    metadata:
      l9_rule_id: AST-TRANSPORT-001
      mode: shadow
      contract: TransportPacket_only
      autofix_safe: false
    pattern-either:
      - pattern: from $MOD import PacketEnvelope
      - pattern: import PacketEnvelope

  - id: l9.transport.packet-envelope-instantiation
    languages: [python]
    severity: WARNING
    message: PacketEnvelope instantiation is forbidden. Construct or derive TransportPacket instead.
    metadata:
      l9_rule_id: AST-TRANSPORT-002
      mode: shadow
      contract: TransportPacket_only
      autofix_safe: false
    pattern: PacketEnvelope(...)

  - id: l9.transport.alternate-packet-contract
    languages: [python]
    severity: WARNING
    message: Alternate packet contracts are forbidden in core paths. TransportPacket is the only wire format.
    metadata:
      l9_rule_id: AST-TRANSPORT-003
      mode: shadow
      contract: TransportPacket_only
      autofix_safe: false
    pattern-either:
      - pattern: AgentPacket(...)
      - pattern: RawExecuteDict(...)
      - pattern: raw_execute_dict

  - id: l9.transport.raw-execute-dict-contract
    languages: [python]
    severity: WARNING
    message: Raw dict execute contracts are forbidden. Execution boundaries must use TransportPacket.
    metadata:
      l9_rule_id: AST-TRANSPORT-004
      mode: shadow
      contract: TransportPacket_only
      autofix_safe: false
    patterns:
      - pattern-either:
          - pattern: requests.post($URL, json=$PAYLOAD, ...)
          - pattern: httpx.post($URL, json=$PAYLOAD, ...)
      - metavariable-pattern:
          metavariable: $PAYLOAD
          patterns:
            - pattern-not: packet
