# --- L9_META ---
# l9_schema: 1
# origin: l9-ci-universal-base
# layer: [ci, semgrep, logging]
# tags: [L9_TEMPLATE, pii, secrets, shadow-mode]
# owner: platform
# status: active
# --- /L9_META ---
rules:
  - id: l9.logging.forbidden-secret-field
    languages: [python]
    severity: WARNING
    message: Forbidden secret-like value passed to logger. Do not log api_key, token, password, secret, raw_response, or llm_response.
    metadata:
      l9_rule_id: AST-LOGGING-001
      mode: shadow
      contract: forbidden_logging_fields
      autofix_safe: false
    pattern-either:
      - pattern: logger.$LEVEL(..., $SECRET, ...)
      - pattern: logging.$LEVEL(..., $SECRET, ...)
    metavariable-regex:
      metavariable: $SECRET
      regex: (?i).*(api_key|token|password|secret|raw_response|llm_response).*

  - id: l9.logging.forbidden-secret-keyword
    languages: [python]
    severity: WARNING
    message: Forbidden secret-like keyword passed to logger. Redact or omit sensitive values.
    metadata:
      l9_rule_id: AST-LOGGING-002
      mode: shadow
      contract: forbidden_logging_fields
      autofix_safe: false
    pattern-regex: '(logger|logging)\.(debug|info|warning|error|exception|critical)\(.*(api_key|token|password|secret|raw_response|llm_response)\s*='

  - id: l9.logging.f-string-secret
    languages: [python]
    severity: WARNING
    message: F-string logging of secret-like values is forbidden.
    metadata:
      l9_rule_id: AST-LOGGING-003
      mode: shadow
      contract: forbidden_logging_fields
      autofix_safe: false
    pattern-regex: '(logger|logging)\.(debug|info|warning|error|exception|critical)\(f["''].*(api_key|token|password|secret|raw_response|llm_response).*'
